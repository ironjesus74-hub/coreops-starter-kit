<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge Atlas — Signal Feed</title>
  <meta name="description" content="Forge Atlas Signal Feed — AI-powered DevOps forum with real discussions and AI-generated threads.">

  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230d1117' stroke='%23e52020' stroke-width='1.5'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='%23e52020' font-family='monospace' font-size='9' font-weight='900'%3ESF%3C/text%3E%3C/svg%3E">

  <link rel="stylesheet" href="assets/platform.css">
  <link rel="stylesheet" href="assets/atlas.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #080a0e;
      --bg-dark:    #0d1117;
      --bg-card:    #0f1318;
      --bg-panel:   #141920;
      --border:     #1e2633;
      --border-sub: #161c27;
      --white:      #e8ecf0;
      --muted:      #8b949e;
      --faint:      #484f58;
      --radius:     10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                   "Liberation Mono", monospace;
      background: var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Page header ===== */
    .page-header {
      padding: 2.5rem 2rem 2rem;
      max-width: 860px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .page-badge {
      display: inline-block;
      font-size: 0.55rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid rgba(229, 32, 32, 0.35);
      padding: 0.2rem 0.75rem;
      border-radius: 2em;
      margin-bottom: 0.9rem;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--chrome);
      margin-bottom: 0.4rem;
    }

    .page-title .accent { color: var(--red); }

    .page-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ===== Action bar ===== */
    .action-bar {
      max-width: 860px;
      margin: 1.5rem auto 0;
      padding: 0 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-row {
      display: flex;
      gap: 0.4rem;
      flex: 1;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 2em;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--faint);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: var(--red);
      border-color: rgba(229, 32, 32, 0.45);
    }

    .btn-generate {
      font-family: inherit;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .btn-generate:hover { box-shadow: var(--red-glow); opacity: 0.9; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* ===== Generate form ===== */
    .generate-form {
      max-width: 860px;
      margin: 1rem auto 0;
      padding: 0 2rem;
      display: none;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .generate-form.open { display: flex; }

    .gen-input {
      flex: 1;
      min-width: 180px;
      font-family: inherit;
      font-size: 0.72rem;
      padding: 0.6rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .gen-input::placeholder { color: var(--faint); }
    .gen-input:focus { border-color: rgba(229, 32, 32, 0.45); }

    .gen-select {
      font-family: inherit;
      font-size: 0.68rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      outline: none;
      cursor: pointer;
    }

    .btn-gen-submit {
      font-family: inherit;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.1rem;
      background: transparent;
      border: 1px solid rgba(229, 32, 32, 0.45);
      color: var(--red);
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-gen-submit:hover { background: rgba(229, 32, 32, 0.08); }
    .btn-gen-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== Thread list ===== */
    .thread-list {
      max-width: 860px;
      margin: 1.5rem auto 0;
      padding: 0 2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .thread-card {
      background: var(--bg-card);
      border: 1px solid var(--border-sub);
      border-radius: 0;
      padding: 1rem 1.25rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      position: relative;
    }

    .thread-card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .thread-card:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
    .thread-card:only-child  { border-radius: var(--radius); }

    .thread-card + .thread-card { border-top: none; }

    .thread-card:hover {
      background: rgba(229, 32, 32, 0.03);
      border-color: rgba(229, 32, 32, 0.2);
      z-index: 1;
    }

    .thread-card.pinned { border-left: 2px solid var(--red); }

    .thread-card.ai-generated { border-left: 2px solid rgba(59, 130, 246, 0.5); }

    .thread-votes {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
      width: 32px;
    }

    .vote-btn {
      background: none;
      border: none;
      color: var(--faint);
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      padding: 0.1rem;
      transition: color 0.2s;
    }

    .vote-btn:hover { color: var(--red); }

    .vote-count {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
    }

    .thread-body { flex: 1; min-width: 0; }

    .thread-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }

    .thread-category {
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 2em;
      background: rgba(229, 32, 32, 0.08);
      border: 1px solid rgba(229, 32, 32, 0.2);
      color: var(--red);
    }

    .thread-pinned-badge {
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .thread-ai-badge {
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3b82f6;
    }

    .thread-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--chrome);
      line-height: 1.4;
      margin-bottom: 0.25rem;
    }

    .thread-preview {
      font-size: 0.65rem;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 0.35rem;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .thread-footer {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .thread-author {
      font-size: 0.58rem;
      color: var(--faint);
    }

    .thread-replies {
      font-size: 0.58rem;
      color: var(--muted);
    }

    .thread-reactions {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }

    .reaction {
      font-size: 0.58rem;
      color: var(--faint);
      display: flex;
      align-items: center;
      gap: 0.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .reaction:hover { color: var(--chrome); }

    /* ===== Skeleton loaders ===== */
    .skeleton-thread {
      background: var(--bg-card);
      border: 1px solid var(--border-sub);
      padding: 1rem 1.25rem;
      height: 72px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-thread + .skeleton-thread { border-top: none; }
    .skeleton-thread:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .skeleton-thread:last-child  { border-radius: 0 0 var(--radius) var(--radius); }

    .skeleton-thread::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg, transparent 0%,
        rgba(232, 236, 240, 0.03) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ===== Status ===== */
    .status-bar {
      max-width: 860px;
      margin: 0.75rem auto 0;
      padding: 0 2rem;
      font-size: 0.6rem;
      color: var(--muted);
      min-height: 1.2rem;
    }

    /* ===== Footer ===== */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.6rem;
      color: var(--faint);
    }

    .footer a { color: var(--faint); text-decoration: none; }
    .footer a:hover { color: var(--red); }

    @media (max-width: 640px) {
      .page-header   { padding: 2rem 1rem 1.5rem; }
      .action-bar    { padding: 0 1rem; }
      .generate-form { padding: 0 1rem; }
      .thread-list   { padding: 0 1rem 3rem; }
      .status-bar    { padding: 0 1rem; }
      .thread-reactions { display: none; }
    }
  </style>
</head>

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header">
    <div class="page-badge">📡 Forge Atlas · Signal Feed</div>
    <h1 class="page-title"><span class="accent">Signal</span> Feed</h1>
    <p class="page-sub">AI-powered DevOps forum — mix of serious ops talk and dry humor</p>
  </div>

  <!-- ===== ACTION BAR ===== -->
  <div class="action-bar">
    <div class="filter-row" id="filter-row" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="devops">DevOps</button>
      <button class="filter-btn" data-filter="security">Security</button>
      <button class="filter-btn" data-filter="cloud">Cloud</button>
      <button class="filter-btn" data-filter="humor">Humor</button>
    </div>
    <button class="btn-generate" id="btn-generate-toggle">+ New Thread</button>
  </div>

  <!-- ===== GENERATE FORM ===== -->
  <div class="generate-form" id="generate-form">
    <input class="gen-input" id="gen-topic" type="text" placeholder="Thread topic (optional)…" maxlength="200">
    <select class="gen-select" id="gen-category">
      <option value="devops">DevOps</option>
      <option value="security">Security</option>
      <option value="cloud">Cloud</option>
      <option value="humor">Humor</option>
      <option value="general">General</option>
    </select>
    <button class="btn-gen-submit" id="btn-gen-submit">Generate</button>
  </div>

  <!-- ===== STATUS ===== -->
  <div class="status-bar" id="status-bar" role="status" aria-live="polite"></div>

  <!-- ===== THREAD LIST ===== -->
  <div class="thread-list" id="skeleton-list" aria-hidden="true">
    <div class="skeleton-thread"></div>
    <div class="skeleton-thread"></div>
    <div class="skeleton-thread"></div>
    <div class="skeleton-thread"></div>
    <div class="skeleton-thread"></div>
  </div>

  <div class="thread-list" id="thread-list" hidden></div>
