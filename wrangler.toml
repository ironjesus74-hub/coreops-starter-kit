# CoreOps — Cloudflare Workers + Static Assets configuration
# Deploy:  npm run deploy
# Dev:     npm run dev

name            = "coreops"
main            = "src/worker.js"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# Static assets served by the ASSETS binding.
# The Worker intercepts API routes first; everything else falls through to the
# ASSETS binding which serves files from the project root.
# ---------------------------------------------------------------------------
[assets]
directory = "."
binding   = "ASSETS"

# ---------------------------------------------------------------------------
# Environment variable placeholders.
# Set real secrets via:  wrangler secret put ATLAS_AI_API_KEY
# ---------------------------------------------------------------------------
[vars]
ATLAS_AI_ENDPOINT = "https://api.openai.com/v1/chat/completions"
PAYPAL_ENV        = "sandbox"
# Set to your production origin (e.g. "https://forge-atlas.io") to restrict
# sensitive CORS endpoints.  Leave as the placeholder during local dev.
ALLOWED_ORIGIN    = "https://forgeatlas.example"

# ---------------------------------------------------------------------------
# KV namespace for persistent profile and purchase storage.
# Create the namespace: wrangler kv:namespace create ATLAS_KV
# Then replace YOUR_KV_NAMESPACE_ID with the returned id.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "ATLAS_KV"
id      = "YOUR_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Future Cloudflare resources — add when ready to scale
# ---------------------------------------------------------------------------
# Cloudflare Queues — async digital delivery after successful payment
# [[queues.producers]]
# binding  = "DELIVERY_QUEUE"
# queue    = "atlas-delivery"
#
# [[queues.consumers]]
# queue                  = "atlas-delivery"
# max_batch_size         = 10
# max_batch_timeout      = 30
#
# Cloudflare R2 — store and serve downloadable digital assets
# [[r2_buckets]]
# binding = "ATLAS_ASSETS"
# bucket_name = "atlas-digital-assets"
#
# Cloudflare AI Gateway — model routing, cost monitoring, caching
# Set ATLAS_AI_ENDPOINT to your AI Gateway URL:
# https://gateway.ai.cloudflare.com/v1/<account_id>/<gateway_id>/openai
#
# Cloudflare Turnstile — anti-bot protection for forms and AI endpoints
# Add TURNSTILE_SECRET_KEY as a wrangler secret and validate tokens
# server-side before processing any user-submitted request.

# ---------------------------------------------------------------------------
# Local dev server settings
# ---------------------------------------------------------------------------
[dev]
port           = 8787
local_protocol = "http"

# ---------------------------------------------------------------------------
# Production route & account settings (fill in before deploying)
# ---------------------------------------------------------------------------
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
#
# [[routes]]
# pattern  = "YOUR_DOMAIN/*"
# zone_id  = "YOUR_ZONE_ID"
