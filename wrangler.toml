# CoreOps — Cloudflare Workers + Static Assets configuration
# Deploy:  npm run deploy
# Dev:     npm run dev

name            = "coreops"
main            = "src/worker.js"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# Static assets served by the ASSETS binding.
# The Worker intercepts API routes first; everything else falls through to the
# ASSETS binding which serves files from the project root.
# ---------------------------------------------------------------------------
[assets]
directory = "."
binding   = "ASSETS"

# ---------------------------------------------------------------------------
# KV Namespace — ATLAS_KV
# Used for: user profiles, Atlas prompt memory, feature flags, product cache.
# Create with:  wrangler kv namespace create ATLAS_KV
# Then replace the id below with the output ID.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "ATLAS_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Environment variable placeholders.
# Set real secrets via:  wrangler secret put <NAME>
#
# Secrets (never stored in source):
#   ATLAS_AI_API_KEY      — OpenAI-compatible API key
#   PAYPAL_CLIENT_ID      — PayPal app client ID
#   PAYPAL_CLIENT_SECRET  — PayPal app client secret
#   PAYPAL_WEBHOOK_ID     — PayPal webhook ID for signature verification
#   CONTACT_WEBHOOK_URL   — Optional webhook for contact form delivery
# ---------------------------------------------------------------------------
[vars]
ATLAS_AI_ENDPOINT = "https://api.openai.com/v1/chat/completions"
PAYPAL_ENV        = "sandbox"

# ---------------------------------------------------------------------------
# Local dev server settings
# ---------------------------------------------------------------------------
[dev]
port           = 8787
local_protocol = "http"

# ---------------------------------------------------------------------------
# Production route & account settings (fill in before deploying)
# ---------------------------------------------------------------------------
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
#
# [[routes]]
# pattern  = "YOUR_DOMAIN/*"
# zone_id  = "YOUR_ZONE_ID"
