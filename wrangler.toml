# CoreOps — Cloudflare Workers + Static Assets configuration
# Deploy:  npm run deploy
# Dev:     npm run dev

name            = "coreops"
main            = "src/worker.js"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# Static assets served by the ASSETS binding.
# The Worker intercepts API routes first; everything else falls through to the
# ASSETS binding which serves files from the project root.
# ---------------------------------------------------------------------------
[assets]
directory = "."
binding   = "ASSETS"

# ---------------------------------------------------------------------------
# Environment variable placeholders.
# Set real secrets via:  wrangler secret put ATLAS_AI_API_KEY
# ---------------------------------------------------------------------------
[vars]
ATLAS_AI_ENDPOINT = "https://api.openai.com/v1/chat/completions"
PAYPAL_ENV        = "sandbox"

# ---------------------------------------------------------------------------
# Local dev server settings
# ---------------------------------------------------------------------------
[dev]
port           = 8787
local_protocol = "http"

# ---------------------------------------------------------------------------
# Production route & account settings (fill in before deploying)
# ---------------------------------------------------------------------------
# Set account_id here OR export CLOUDFLARE_ACCOUNT_ID in your CI environment
# (GitHub Actions: Settings → Secrets → CLOUDFLARE_ACCOUNT_ID).
# Without this, `wrangler deploy` will prompt interactively and fail in CI.
#
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
#
# Before going live, also change PAYPAL_ENV (above) from "sandbox" to "live"
# and verify all secrets are set:
#   wrangler secret put ATLAS_AI_API_KEY
#   wrangler secret put PAYPAL_CLIENT_ID
#   wrangler secret put PAYPAL_CLIENT_SECRET
#   wrangler secret put PAYPAL_WEBHOOK_ID
#
# [[routes]]
# pattern  = "YOUR_DOMAIN/*"
# zone_id  = "YOUR_ZONE_ID"
