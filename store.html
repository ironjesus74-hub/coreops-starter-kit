<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreOps Store</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid #21262d;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #39d353;
    }
    header .logo span { color: #8b949e; font-weight: 400; }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .store-heading {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #e6edf3;
      margin-bottom: 0.5rem;
    }
    .store-sub {
      color: #8b949e;
      font-size: 0.875rem;
      margin-bottom: 2.5rem;
    }

    /* ── Product Grid ────────────────────────────────────── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* ── Product Card ────────────────────────────────────── */
    .product-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {
      border-color: #39d353;
      box-shadow: 0 0 16px rgba(57, 211, 83, 0.12);
    }

    .atlas-drop {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #39d353;
      background: rgba(57, 211, 83, 0.1);
      border: 1px solid rgba(57, 211, 83, 0.3);
      border-radius: 4px;
      padding: 0.15rem 0.55rem;
      width: fit-content;
    }

    .product-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e6edf3;
      line-height: 1.3;
    }

    .product-price {
      font-size: 1.4rem;
      font-weight: 700;
      color: #39d353;
    }

    .product-desc {
      font-size: 0.85rem;
      color: #8b949e;
      line-height: 1.6;
      flex: 1;
    }

    .product-cta {
      margin-top: 0.5rem;
    }
    .btn-buy {
      display: block;
      width: 100%;
      padding: 0.65rem 1rem;
      background: #39d353;
      color: #0d1117;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-buy:hover { background: #2ea043; }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid #21262d;
      padding: 1.5rem 2rem;
      text-align: center;
      color: #8b949e;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">⚡ CoreOps <span>Store</span></div>
  </header>

  <main>
    <h1 class="store-heading">Atlas Drops</h1>
    <p class="store-sub">Exclusive releases. Limited access. Upgrade your stack.</p>

    <div class="product-grid">

      <!-- Atlas Premium Access -->
      <div class="product-card">
        <span class="atlas-drop">Atlas Drop</span>
        <h3>Atlas Premium Access</h3>
        <p class="product-price">$29.00</p>
        <p class="product-desc">
          Unlock premium Atlas features, exclusive battle access, and advanced tools.
        </p>
        <div class="product-cta">
          <button class="btn-buy" type="button">Buy Now</button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    &copy; 2026 CoreOps &mdash; Mobile-first DevOps &amp; Automation
  </footer>

</body>
</html>
