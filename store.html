<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreOps Store</title>
  <link rel="stylesheet" href="assets/css/product.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #080b14;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e2e8ff;
    }

    h1 {
      color: #f4f7ff;
      font-size: 2rem;
      margin: 0 0 4px;
    }

    .store-subtitle {
      color: rgba(226, 232, 255, 0.6);
      margin: 0 0 8px;
    }
  </style>
</head>
<body>
  <h1>CoreOps Store</h1>
  <p class="store-subtitle">Premium tools, access, and resources.</p>

  <div class="product-grid">

    <div class="product-card">
      <span class="product-badge">Atlas Drop</span>
      <h3 class="product-title">Atlas Premium Access</h3>
      <p class="product-price">$29.00</p>
      <p class="product-desc">
        Unlock premium Atlas features, exclusive battle access, and advanced tools.
      </p>
      <div class="paypal-hosted-button">
        <!-- PayPal hosted button -->
      </div>
    </div>

  </div>
</body>
</html>
