name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "33 4 * * 0"
  workflow_dispatch: {}

permissions:
  security-events: write
  contents: read
  actions: read
  pull-requests: read

# Queue concurrent scans rather than cancelling them — cancel-in-progress
# caused runs to be marked "failure" with 0 jobs on rapid pushes to main.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ['javascript']

      # JavaScript does not require a build step — autobuild is omitted
      # intentionally to avoid spurious failures on Worker/Node projects.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
